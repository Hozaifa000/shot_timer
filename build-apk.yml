name: Build Shot Timer APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install npm dependencies
        run: npm install

      - name: Add Android platform
        run: npx cap add android

      - name: Inject custom Android files
        run: |
          mkdir -p android/app/src/main/java/com/shottimer/app
          cp android-snippets/MicAudioPlugin.kt android/app/src/main/java/com/shottimer/app/MicAudioPlugin.kt
          cp android-snippets/MainActivity.java android/app/src/main/java/com/shottimer/app/MainActivity.java
          cp android-snippets/AndroidManifest.xml android/app/src/main/AndroidManifest.xml

      - name: Capacitor sync
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: shot-timer-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
